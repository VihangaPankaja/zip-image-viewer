name: Version Check

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  version-bump:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Verify version bump
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const { execSync } = require('node:child_process');

          function parseVersion(value) {
            return String(value).split('.').map((part) => Number(part));
          }

          function compareVersions(left, right) {
            const maxLength = Math.max(left.length, right.length);
            for (let index = 0; index < maxLength; index += 1) {
              const leftPart = left[index] || 0;
              const rightPart = right[index] || 0;
              if (leftPart > rightPart) return 1;
              if (leftPart < rightPart) return -1;
            }
            return 0;
          }

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const packageLock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const basePackageJson = JSON.parse(
            execSync(`git show origin/${process.env.BASE_REF}:package.json`, { encoding: 'utf8' })
          );

          if (packageJson.version !== packageLock.version || packageJson.version !== packageLock.packages[''].version) {
            throw new Error('package.json and package-lock.json versions must match.');
          }

          const headVersion = parseVersion(packageJson.version);
          const baseVersion = parseVersion(basePackageJson.version);

          if (headVersion.some((part) => !Number.isInteger(part) || part < 0)) {
            throw new Error(`Invalid head version: ${packageJson.version}`);
          }

          if (baseVersion.some((part) => !Number.isInteger(part) || part < 0)) {
            throw new Error(`Invalid base version: ${basePackageJson.version}`);
          }

          if (compareVersions(headVersion, baseVersion) <= 0) {
            throw new Error(
              `Version must be bumped above ${basePackageJson.version} on PRs to ${process.env.BASE_REF}. Current version: ${packageJson.version}`
            );
          }

          console.log(`Version bump check passed: ${basePackageJson.version} -> ${packageJson.version}`);
          EOF
